spring.application.name=IT211_Project_BadmintonManager

# =========================
# DATASOURCE
# =========================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/project_badminton_db_api_cntt4?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=Linh110711@

# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# SERVER
# =========================
server.port=8080

# =========================
# LOGGING
# =========================
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG

# =========================
# JWT
# =========================
jwt.secret=MySecretKeyForBadmintonManagerProject2026VeryStrongSecretKey
jwt.access-expiration=1800000
jwt.refresh-expiration=604800000

# =========================
# CLOUDINARY
# =========================
cloudinary.cloud-name=your_cloud_name
cloudinary.api-key=your_api_key
cloudinary.api-secret=your_api_secret

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================
# JACKSON
# =========================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# =========================
# AOP
# =========================
spring.aop.auto=true
spring.aop.proxy-target-class=true
